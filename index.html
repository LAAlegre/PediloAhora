<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>PediloAhora</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <h1>PediloAhora</h1>

    <nav>

        <button onclick="mostrarSeccion('stock')">Stock</button>
        <button onclick="mostrarSeccion('proveedores')">Proveedores</button>
        <button onclick="mostrarSeccion('pedidos')">Pedidos</button>
    </nav>
    <div id="dashboard">
        <div class="card">
            <h3>Productos</h3>
            <p id="totalProductos">0</p>
        </div>

        <div class="card">
            <h3>Bajo stock</h3>
            <p id="bajoStock">0</p>
        </div>

        <div class="card">
            <h3>Proveedores</h3>
            <p id="totalProveedores">0</p>
        </div>
        <div id="alertas"></div>
    </div>
    <div class="form-stock">
        <input list="productos" id="producto" placeholder="Buscar producto...">
        <button onclick="agregarAlCatalogo()">+</button>
        <input id="cantidad" type="number" placeholder="Cantidad">
        <input id="minimo" type="number" placeholder="Stock mínimo">
        <select id="categoria"></select>
        <select id="proveedorSelect"></select>
        <button onclick="agregarProducto()">Agregar</button>
    </div>


    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Proveedor</th>
                <th>Cantidad</th>
                <th>Mínimo</th>
            </tr>
        </thead>
        <tbody id="listaStock"></tbody>
    </table>
    </section>

    <select id="categoria">
        <option value="Bebidas">Bebidas</option>
        <option value="Alimentos">Alimentos</option>
        <option value="Limpieza">Limpieza</option>
        <option value="Descartables">Descartables</option>
        <option value="Cocina">Cocina</option>
        <option value="Freezer">Freezer</option>
    </select>

    <section id="proveedores" style="display:none;">
        <h2>Proveedores</h2>
        <input id="nombreProv" placeholder="Nombre">
        <input id="telefonoProv" placeholder="Teléfono">
        <button onclick="agregarProveedor()">Agregar</button>
        <ul id="listaProveedores"></ul>
    </section>

    <section id="pedidos" style="display:none;">
        <h2>Pedido mensual</h2>
        <button onclick="generarPedido()">Generar pedido</button>
        <button onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
        <ul id="listaPedido"></ul>
    </section>

    <input id="nombre" placeholder="Nombre">
    <input id="productoPedido" placeholder="Producto">
    <button onclick="enviar()">Enviar</button>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="app.js"></script>
</body>

</html>
